name: Preview Deploy

# Deploys every PR to a temporary Firebase Hosting preview channel and posts
# the URL as a PR comment. Channels expire on their own after 7 days.
on:
  pull_request:
    branches:
      - main

jobs:
  preview:
    # PRs from forks don't get secrets; skip instead of failing.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: petite-jerusalem-dev
          expires: 7d
